<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Quantum Core Systems</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif; background-color: #f9f9f9; color: #333;">

    <!-- NAVIGATION BAR -->
    <nav style="background-color: #ffffff; border-bottom: 2px solid #ddd; padding: 15px 0;">
        <div style="max-width: 1100px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html">
                <img src="Futuristic QCS logo design.png" alt="Quantum Core Systems Logo" style="height: 55px; width: auto;">
            </a>
            <div style="display: flex; gap: 30px; font-size: 16px;">
                <a href="index.html" style="text-decoration: none; color: #000;">Home</a>
                <a href="product-detail.html" style="text-decoration: none; color: #000;">Shop Laptops</a>
                <a href="cart.html" style="text-decoration: none; color: #000;">Cart</a>
                <a href="checkout.html" style="text-decoration: none; color: #000;">Checkout</a>
                <a href="post-purchase.html" style="text-decoration: none; color: #000;">My Orders</a>
                <a href="feedback.html" style="text-decoration: none; color: #000;">Feedback</a>
            </div>
            <a href="cart.html" style="text-decoration: none; color: #000; font-size: 22px;">🛒</a>
        </div>
    </nav>

    <!-- FEEDBACK FORM -->
    <main style="max-width: 700px; margin: 60px auto; padding: 0 20px;">
        <h1 style="font-size: 32px; text-align: center;">We Value Your Feedback</h1>
        <form style="background-color: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 40px; margin-top: 30px;">
            <label style="display:block; margin:15px 0 5px;">Full Name</label>
            <input type="text" required style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px;">Email Address</label>
            <input type="email" required style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px;">

            <label style="display:block; margin:15px 0 5px;">Message</label>
            <textarea rows="6" required style="width:100%; padding:12px; border:1px solid #ccc; border-radius:6px;"></textarea>

            <button type="submit" 
                    style="width:100%; background-color:#111; color:#fff; padding:16px; margin-top:30px; border:none; border-radius:6px; font-size:18px;">
                Submit Feedback
            </button>
        </form>
    </main>

    <!-- FOOTER -->
    <footer style="background-color: #ffffff; border-top: 2px solid #ddd; padding: 40px 20px; margin-top: 80px;">
        <div style="max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; font-size: 15px;">
            <div><strong>Shop</strong><br>Laptops • Accessories • Brands</div>
            <div><strong>Support</strong><br>Warranty • Returns • Drivers</div>
            <div><strong>Company</strong><br>About Us • Contact • Careers</div>
        </div>
        <div style="text-align: center; margin-top: 40px; font-size: 13px; color: #777;">
            © 2026 Quantum Core Systems — All Rights Reserved
        </div>
    </footer>

</body>
</html>
