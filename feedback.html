<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Quantum Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="py-3">
        <nav class="navbar navbar-expand-lg container">
            <a class="navbar-brand text-white fw-bold" href="index.html">
                <img src="images/logo.png" alt="Quantum Core Logo" width="50" height="50" class="me-2">
                Quantum Core
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <nav class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="feedback.html">Feedback</a></li>
                </ul>
            </nav>
        </nav>
    </header>

    <main>
        <section class="py-5">
            <article class="container">
                <h2 class="text-center mb-4">Send Us Your Feedback</h2>
                <form id="feedbackForm" class="row g-3">
                    <article class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required>
                    </article>
                    <article class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </article>
                    <article class="col-12">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="6" required></textarea>
                    </article>
                    <article class="col-12 text-center">
                        <button type="submit" class="btn btn-success btn-lg">Submit Feedback</button>
                    </article>
                </form>
            </article>
        </section>
    </main>

    <footer class="py-4 text-center">
        <p>&copy; 2026 Quantum Core Systems. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your feedback! We appreciate it.');
            this.reset();
        });
    </script>
</body>
</html>
